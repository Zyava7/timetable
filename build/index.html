<!DOCTYPE html>
<html lang="ua">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title></title>
		<link rel="stylesheet" href="./css/main.css" />

		<link rel="icon" href="./img/favicons/favicon.svg" type="image/svg+xml" />
		<link rel="shortcut icon" href="./img/favicons/favicon.ico" />
		<link rel="apple-touch-icon" href="./img/favicons/apple-touch-icon.png" />
	</head>

	<body>
		<header class="header"></header>
		<main>
			<section>
				<div class="shift-settings">
					<label for="start-date">Початкова дата першого денного дня:</label>
					<input type="date" id="start-date" />
					<button id="set-start">Встановити</button>
				</div>
				<div class="calendar">
					<div class="calendar-header">
						<div class="calendar-header-main">
							<button id="prev">&#8249;</button>
							<div id="month-year"></div>
							<button id="next">&#8250;</button>
						</div>
					</div>
					<div class="calendar-grid calendar-days">
						<div>Пн</div>
						<div>Вт</div>
						<div>Ср</div>
						<div>Чт</div>
						<div>Пт</div>
						<div class="red">Сб</div>
						<div class="red">Нд</div>
					</div>
					<div class="calendar-grid calendar-dates" id="dates"></div>
				</div>
			</section>
		</main>

		<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
		<script src="./js/index.bundle.js"></script>
	</body>
</html>
